<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Waspberry Social</title>
<style>
    @font-face {font-family: "Raleway";
      src: url("/fonts/ralewaywas/Raleway-VariableFont_wght.ttf");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #121212;
    color: #e0e0e0;
    display: flex;
    height: 100vh;
}
#sidebar {
    width: 220px;
    background: #1e1e1e;
    padding: 10px;
    display: flex;
    flex-direction: column;
}
#sidebar a {
    color: #00bfa5;
    text-decoration: none;
    padding: 5px;
}
#content {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
}
.card {
    background: #1c1c1c;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 4px;
}
input, textarea {
    width: 100%;
    margin: 5px 0;
    padding: 6px;
    background: #2c2c2c;
    color: white;
    border: 1px solid #333;
}
button {
    background: #ff7043;
    border: none;
    padding: 6px 10px;
    color: white;
    cursor: pointer;
}
    h1 {font-family: "Raleway";}
</style>
</head>
<body>

<div id="sidebar">
    <a href="/">Home</a>
    <a href="/login">Login</a>
    <a href="/register">Register</a>
    <a href="/messages">Messages</a>
    <a href="/customize">Edit Profile</a>
</div>

<div id="content"></div>

<script>
const apiBase = 'https://c9v96x-5000.csb.app/api';
const contentDiv = document.getElementById('content');


function safeText(text) {
    return document.createTextNode(text || '');
}

function safeLink(url) {
    try {
        const u = new URL(url);
        if (u.protocol === 'http:' || u.protocol === 'https:') {
            const a = document.createElement('a');
            a.href = u.href;
            a.textContent = u.href;
            a.target = "_blank";
            a.rel = "noopener noreferrer";
            return a;
        }
    } catch {}
    return safeText('[invalid link]');
}

async function fetchJSON(url, options={}) {
    try {
        const res = await fetch(url, {...options, credentials:'include'});
        return await res.json();
    } catch {
        return {error:"Network error"};
    }
}


function createPostCard(post) {
    const div = document.createElement('div');
    div.className = 'card';

    const title = document.createElement('h3');
    title.textContent = `${post.author} in ${post.city}`;

    const content = document.createElement('p');
    content.textContent = post.content;

    div.appendChild(title);
    div.appendChild(content);

    div.onclick = () => {
        history.pushState({}, '', `/post/${post.id}`);
        router();
    };

    return div;
}

async function renderHome() {
    contentDiv.innerHTML = '';

    const title = document.createElement('h1');
    title.textContent = 'Social';

    const postBox = document.createElement('div');
    postBox.className = 'card';

    const textarea = document.createElement('textarea');
    textarea.placeholder = 'Write something...';

    const cityInput = document.createElement('input');
    cityInput.placeholder = 'City';

    const btn = document.createElement('button');
    btn.textContent = 'Post';

    const msg = document.createElement('p');

    btn.onclick = async () => {
        const content = textarea.value.trim();
        const city = cityInput.value.trim();

        if (!content || !city) {
            msg.textContent = 'Missing fields';
            return;
        }

        const res = await fetchJSON(`${apiBase}/posts`, {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({content, city})
        });

        msg.textContent = res.success ? 'Posted!' : res.error;

        if (res.success) {
            textarea.value = '';
            cityInput.value = '';
            renderHome();
        }
    };

    postBox.appendChild(textarea);
    postBox.appendChild(cityInput);
    postBox.appendChild(btn);
    postBox.appendChild(msg);

    contentDiv.appendChild(title);
    contentDiv.appendChild(postBox);

    const data = await fetchJSON(`${apiBase}/posts`);
    if (data.error) {
        contentDiv.appendChild(safeText(data.error));
        return;
    }

    data.data.forEach(post => {
        contentDiv.appendChild(createPostCard(post));
    });
}


async function renderPost(id) {
    contentDiv.innerHTML = '';

    const data = await fetchJSON(`${apiBase}/posts/${id}`);
    if (data.error) {
        contentDiv.appendChild(safeText(data.error));
        return;
    }

    const p = data.data;

    const card = document.createElement('div');
    card.className = 'card';

    const author = document.createElement('h2');
    author.textContent = p.author;

    const content = document.createElement('p');
    content.textContent = p.content;

    const likes = document.createElement('p');
    likes.textContent = `Likes: ${p.likes}`;

    const likeBtn = document.createElement('button');
    likeBtn.textContent = 'Like';
    likeBtn.onclick = async () => {
        await fetchJSON(`${apiBase}/posts/${id}/like`, {method:'POST'});
        renderPost(id);
    };

    card.appendChild(author);
    card.appendChild(content);
    card.appendChild(likes);
    card.appendChild(likeBtn);

    const replyBox = document.createElement('div');
    const replyInput = document.createElement('input');
    replyInput.placeholder = 'Reply...';

    const replyBtn = document.createElement('button');
    replyBtn.textContent = 'Reply';

    replyBtn.onclick = async () => {
        await fetchJSON(`${apiBase}/posts/${id}/reply`, {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({content: replyInput.value})
        });
        renderPost(id);
    };

    replyBox.appendChild(replyInput);
    replyBox.appendChild(replyBtn);

    card.appendChild(replyBox);

    p.replies.forEach(r => {
        const rDiv = document.createElement('div');
        rDiv.className = 'card';

        const strong = document.createElement('strong');
        strong.textContent = r.author;

        rDiv.appendChild(strong);
        rDiv.appendChild(document.createTextNode(`: ${r.content}`));

        card.appendChild(rDiv);
    });

    contentDiv.appendChild(card);
}


function renderLogin() {
    contentDiv.innerHTML = '';

    const inputUser = document.createElement('input');
    inputUser.placeholder = 'Username';

    const inputPass = document.createElement('input');
    inputPass.type = 'password';

    const btn = document.createElement('button');
    btn.textContent = 'Login';

    const msg = document.createElement('p');

    btn.onclick = async () => {
        const res = await fetchJSON(`${apiBase}/login`, {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({
                username: inputUser.value,
                password: inputPass.value
            })
        });
        msg.textContent = res.success ? 'Logged in' : res.error;
    };

    contentDiv.append(inputUser, inputPass, btn, msg);
}


function renderRegister() {
    contentDiv.innerHTML = '';

    const u = document.createElement('input');
    const e = document.createElement('input');
    const p = document.createElement('input');

    u.placeholder = 'Username';
    e.placeholder = 'Email';
    p.placeholder = 'Password';
    p.type = 'password';

    const btn = document.createElement('button');
    btn.textContent = 'Register';

    const msg = document.createElement('p');

    btn.onclick = async () => {
        const res = await fetchJSON(`${apiBase}/register`, {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({
                username:u.value,
                email:e.value,
                password:p.value
            })
        });
        msg.textContent = res.success ? 'Registered' : res.error;
    };

    contentDiv.append(u,e,p,btn,msg);
}


function router() {
    const path = location.pathname;

    if (path === '/') renderHome();
    else if (path === '/login') renderLogin();
    else if (path === '/register') renderRegister();
    else if (path.startsWith('/post/')) renderPost(path.split('/')[2]);
    else contentDiv.textContent = '404';
}

window.addEventListener('popstate', router);
window.addEventListener('load', router);
</script>

</body>
</html>
